<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Royal Ticket Archive</title>

<link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="background-sparkles"></div>

<header class="top-bar">

  <div>
    <h1>👑 Royal Ticket Archive</h1>

    <p>
      The Royal Knowledge Vault For Princes & Princesses
    </p>
  </div>

  <div class="header-actions">

    <button
      id="princessThemeBtn"
      class="btn btn-princess"
    >
      👸 Princess Theme
    </button>

    <button
      id="princeThemeBtn"
      class="btn btn-prince"
    >
      🤴 Prince Theme
    </button>

    <a
      href="new-ticket.html"
      class="btn btn-primary"
    >
      New Ticket
    </a>

  </div>

</header>

<main class="layout">

  <aside class="sidebar card">

    <h2>🔎 Search The Archive</h2>

    <input
      id="searchInput"
      class="input"
      type="text"
      placeholder="Search tickets..."
    >

    <label class="label">
      Category
    </label>

    <select
      id="filterCategory"
      class="input"
    >
      <option value="">
        All Categories
      </option>

      <option value="VPN">
        VPN
      </option>

      <option value="Email">
        Email
      </option>

      <option value="Printer">
        Printer
      </option>

      <option value="Hardware">
        Hardware
      </option>

      <option value="Software">
        Software
      </option>

      <option value="Network">
        Network
      </option>

      <option value="Account">
        Account
      </option>

      <option value="Other">
        Other
      </option>

    </select>

    <button
      id="clearFiltersBtn"
      class="btn btn-secondary full-width"
    >
      Clear Filters
    </button>

  </aside>

  <section class="content card">

    <div class="content-header">

      <h2>📚 Saved Royal Tickets</h2>

      <p>
        Click a ticket to view, edit, or update it.
      </p>

    </div>

    <div
      id="ticketList"
      class="ticket-list"
    ></div>

  </section>

</main>

<script>

const THEME_KEY = "royal-theme";

const princessBtn =
  document.getElementById("princessThemeBtn");

const princeBtn =
  document.getElementById("princeThemeBtn");

function applyTheme(theme) {

  document.body.classList.remove(
    "princess-theme",
    "prince-theme"
  );

  document.body.classList.add(
    theme
  );

  localStorage.setItem(
    THEME_KEY,
    theme
  );
}

const savedTheme =
  localStorage.getItem(THEME_KEY)
  || "princess-theme";

applyTheme(savedTheme);

princessBtn.addEventListener(
  "click",
  () => applyTheme("princess-theme")
);

princeBtn.addEventListener(
  "click",
  () => applyTheme("prince-theme")
);

</script>

.js"></script>

</body>
</html>
