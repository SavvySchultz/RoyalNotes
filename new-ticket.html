<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Create Royal Ticket</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

</head>

<body>

<div class="background-sparkles"></div>

<header class="top-bar">

  <div>

    <h1>
      ✨ Create Royal Ticket
    </h1>

    <p>
      Add a new Prince or Princess ticket to the Royal Archive.
    </p>

  </div>

  <a
    href="index.html"
    class="btn btn-secondary"
  >
    Back To Archive
  </a>

</header>

<main class="single-page">

<section class="card form-card">

<form id="newTicketForm">

  <label
    class="label"
    for="ticketNumber"
  >
    Ticket Number *
  </label>

  <input
    id="ticketNumber"
    class="input"
    type="text"
    placeholder="IT-12345"
    required
  >

  <label
    class="label"
    for="title"
  >
    Ticket Title *
  </label>

  <input
    id="title"
    class="input"
    type="text"
    placeholder="VPN Login Failed After Password Reset"
    required
  >

  <label
    class="label"
    for="royalRole"
  >
    Royal Role *
  </label>

  <select
    id="royalRole"
    class="input"
    required
  >

    <option value="">
      Select Royal Role
    </option>

    <option value="Princess">
      👸 Princess
    </option>

    <option value="Prince">
      🤴 Prince
    </option>

  </select>

  <label
    class="label"
    for="category"
  >
    Category *
  </label>

  <select
    id="category"
    class="input"
    required
  >

    <option value="">
      Select Category
    </option>

    <option value="VPN">
      VPN
    </option>

    <option value="Email">
      Email
    </option>

    <option value="Printer">
      Printer
    </option>

    <option value="Hardware">
      Hardware
    </option>

    <option value="Software">
      Software
    </option>

    <option value="Network">
      Network
    </option>

    <option value="Account">
      Account
    </option>

    <option value="Other">
      Other
    </option>

  </select>

  <label
    class="label"
    for="tags"
  >
    Tags
  </label>

  <input
    id="tags"
    class="input"
    type="text"
    placeholder="vpn, password reset, mfa"
  >

  <label
    class="label"
    for="symptoms"
  >
    Symptoms
  </label>

  <textarea
    id="symptoms"
    class="textarea"
    placeholder="Describe the issue..."
  ></textarea>

  <label
    class="label"
    for="resolution"
  >
    Resolution
  </label>

  <textarea
    id="resolution"
    class="textarea"
    placeholder="Describe the solution..."
  ></textarea>

  <label
    class="label"
    for="notes"
  >
    Additional Notes
  </label>

  <textarea
    id="notes"
    class="textarea"
    placeholder="Helpful notes or reminders..."
  ></textarea>

  <div class="button-row">

    <button
      type="submit"
      class="btn btn-primary"
    >
      Save Royal Ticket
    </button>

    <a
      href="index.html"
      class="btn btn-secondary"
    >
      Cancel
    </a>

  </div>

</form>

<div
  id="saveMessage"
  class="save-message"
></div>

</section>

</main>

<script>

const savedTheme =
  localStorage.getItem("royal-theme")
  || "princess-theme";

document.body.classList.add(
  savedTheme
);

</script>

<script src="new-ticket.js"></script>

</body>
</html>
